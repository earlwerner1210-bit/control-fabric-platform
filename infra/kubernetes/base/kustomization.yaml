apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: control-fabric

commonLabels:
  app.kubernetes.io/part-of: control-fabric

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - api-deployment.yaml
  - api-service.yaml
  - worker-deployment.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - ingress.yaml
