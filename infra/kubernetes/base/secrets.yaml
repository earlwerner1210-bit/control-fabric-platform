apiVersion: v1
kind: Secret
metadata:
  name: control-fabric-secrets
  namespace: control-fabric
  labels:
    app.kubernetes.io/name: control-fabric
    app.kubernetes.io/part-of: control-fabric
type: Opaque
stringData:
  DATABASE_URL: "postgresql://control_fabric:CHANGE_ME@postgres:5432/control_fabric"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_RANDOM_STRING"
  OPENAI_API_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
