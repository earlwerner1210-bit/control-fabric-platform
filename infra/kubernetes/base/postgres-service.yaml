apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: control-fabric
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: control-fabric
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: control-fabric
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
