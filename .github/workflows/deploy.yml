###############################################################################
# Control Fabric Platform — Deploy Pipeline
###############################################################################

name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Determine Environment ────────────────────────────────────────────────
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - name: Determine deployment target
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  # ── Build Images ─────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [determine-env]
    strategy:
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ needs.determine-env.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Database Migration ───────────────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [determine-env, build]
    environment: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ── Deploy to Kubernetes ─────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.determine-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [determine-env, build, migrate]
    environment: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Deploy with kustomize
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          OVERLAY="${{ needs.determine-env.outputs.environment }}"
          TAG="${{ needs.determine-env.outputs.image_tag }}"

          cd infra/kubernetes/overlays/${OVERLAY}
          kustomize edit set image \
            control-fabric-api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${TAG} \
            control-fabric-worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${TAG}

          kubectl apply -k . --prune -l app.kubernetes.io/part-of=control-fabric

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deployment/control-fabric-api -n control-fabric --timeout=300s
          kubectl rollout status deployment/control-fabric-worker -n control-fabric --timeout=300s

      - name: Run smoke tests
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Smoke test failed"
          exit 1
