[alembic]
script_location = alembic
prepend_sys_path = .

# Fallback URL used only when DATABASE_URL env var is not set.
# The env.py reads DATABASE_URL from the app config or environment.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/control_fabric

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
