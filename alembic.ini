[alembic]
# Path to migration scripts -- relative to this file
script_location = shared/db/migrations

# Template used for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Prepend sys.path so that the project root is importable
prepend_sys_path = .

# Timezone for migration file timestamps (default: UTC)
timezone = UTC

# The database URL is sourced from settings in env.py; this is a fallback only.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/control_fabric

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
