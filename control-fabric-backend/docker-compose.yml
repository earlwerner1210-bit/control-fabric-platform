version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cf-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control_fabric
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cf-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    container_name: cf-temporal
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: cf-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: cf-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/control_fabric
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
      ENVIRONMENT: dev
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      INFERENCE_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      JWT_SECRET: local-dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - ./storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: cf-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/control_fabric
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
      ENVIRONMENT: dev
      INFERENCE_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
      JWT_SECRET: local-dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

volumes:
  pgdata:
  redisdata:
