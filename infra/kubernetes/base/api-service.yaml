apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: control-fabric
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: control-fabric
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: control-fabric
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
