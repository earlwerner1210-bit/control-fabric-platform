name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/ sdk/ cli/ benchmarks/ slm/ --output-format=github

      - name: Ruff format check
        run: ruff format --check app/ tests/ sdk/ cli/ slm/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/core/ tests/unit/ -v --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ""
          REDIS_URL: ""

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: control_fabric_test
          POSTGRES_USER: cfp
          POSTGRES_PASSWORD: cfp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql+asyncpg://cfp:cfp_test@localhost:5432/control_fabric_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-minimum-32-chars

  patent-demo:
    name: Patent Demonstration Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run patent demonstration test
        run: |
          python -m pytest "tests/integration/test_full_pipeline.py::TestFullPipeline::test_full_end_to_end_pipeline" -v
          python -m pytest "tests/integration/test_release_governance_pack.py::TestDifferentiationProof" -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ""

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run quick benchmarks
        run: python benchmarks/run_benchmarks.py --quick --out benchmarks/ci-results.json
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/ci-results.json

  console-build:
    name: Operator Console Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/operator-console/package-lock.json

      - name: Install console dependencies
        working-directory: apps/operator-console
        run: npm ci

      - name: Lint console
        working-directory: apps/operator-console
        run: npx eslint src/ --max-warnings=20
        continue-on-error: true

      - name: Build console
        working-directory: apps/operator-console
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, console-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t cfp-api:ci .

      - name: Build console image
        run: docker build -t cfp-console:ci -f apps/operator-console/Dockerfile.console apps/operator-console/

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, patent-demo, console-build, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
