apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: control-fabric
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: control-fabric
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/component: worker
      app.kubernetes.io/part-of: control-fabric
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: control-fabric
    spec:
      containers:
        - name: worker
          image: control-fabric-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args:
            - "-A"
            - "app.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=$(WORKER_CONCURRENCY)"
          envFrom:
            - configMapRef:
                name: control-fabric-config
            - secretRef:
                name: control-fabric-secrets
          livenessProbe:
            exec:
              command:
                - celery
                - "-A"
                - "app.celery_app"
                - "inspect"
                - "ping"
                - "--timeout"
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - celery
                - "-A"
                - "app.celery_app"
                - "inspect"
                - "ping"
                - "--timeout"
                - "5"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      restartPolicy: Always
