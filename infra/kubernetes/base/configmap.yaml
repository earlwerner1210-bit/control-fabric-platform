apiVersion: v1
kind: ConfigMap
metadata:
  name: control-fabric-config
  namespace: control-fabric
  labels:
    app.kubernetes.io/name: control-fabric
    app.kubernetes.io/part-of: control-fabric
data:
  LOG_LEVEL: "info"
  WORKER_CONCURRENCY: "4"
  ENVIRONMENT: "production"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "control_fabric"
