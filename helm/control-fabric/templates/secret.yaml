{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "control-fabric.fullname" . }}-secrets
  labels:
    {{- include "control-fabric.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  JIRA_TOKEN: {{ .Values.secrets.jiraToken | quote }}
  SNOW_USER: {{ .Values.secrets.snowUser | quote }}
  SNOW_PASS: {{ .Values.secrets.snowPass | quote }}
  ADO_PAT: {{ .Values.secrets.adoPat | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  WEBHOOK_SIGNING_SECRET: {{ .Values.secrets.webhookSigningSecret | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
{{- end }}
