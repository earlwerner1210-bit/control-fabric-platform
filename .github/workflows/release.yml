name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build -t cfp-api:${{ steps.version.outputs.VERSION }} .
          docker tag cfp-api:${{ steps.version.outputs.VERSION }} cfp-api:latest
          echo "API image built: cfp-api:${{ steps.version.outputs.VERSION }}"

      - name: Run full test suite before release
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m pytest tests/ -q --tb=short 2>&1 | tail -5

      - name: Create release summary
        run: |
          echo "## Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- API image: cfp-api:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: \`make up\`" >> $GITHUB_STEP_SUMMARY
